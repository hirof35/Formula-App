<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>my-raycast-app</title>
    <style>
      body { margin: 0; background-color: #111; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: sans-serif; }
      #app { text-align: center; }
      canvas { border: 2px solid #555; background-color: #000; }
      .controls { color: white; background: rgba(0,0,0,0.8); padding: 10px; margin-top: 5px; border-radius: 4px; }
    </style>
  </head>
  <body>
    <img id="tex-stone" src="stone_wall.jpg" style="display:none;">
    <img id="tex-wood" src="wood_wall.jpg" style="display:none;">
    <div id="app">
      <canvas id="gameCanvas" width="640" height="480"></canvas>
      <div class="controls">
        クリックで開始 / WASDで移動 / マウスで視点変更
      </div>
    </div>

    <!-- Vite用：必ずスラッシュ "/" を使い、main.tsを指定する -->
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
